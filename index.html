<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anket Sistemi</title>
    <style>
        /* Basit bir arayüz tasarımı */
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e2e;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .anket-kutusu {
            background-color: #252538;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 {
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
        .butonlar {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        button {
            padding: 10px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .evet-btn {
            background-color: #4caf50;
            color: white;
        }
        .evet-btn:hover {
            background-color: #45a049;
        }
        .hayir-btn {
            background-color: #f44336;
            color: white;
        }
        .hayir-btn:hover {
            background-color: #da190b;
        }
    </style>
</head>
<body>

    <div id="anketKonteyner" class="anket-kutusu">
        <h2 id="soruMetni">1- anket denemesi calisti mi?</h2>
        
        <div class="butonlar">
            <button class="evet-btn" onclick="anketCevapGonder('EVET (Tik)')">Evet</button>
            <button class="hayir-btn" onclick="anketCevapGonder('HAYIR')">Hayır</button>
        </div>
    </div>

    <script>
        function anketCevapGonder(cevap) {
            // Discord Webhook linkin
            var webhookUrl = "https://discord.com/api/webhooks/1518622675285573652/aByi4W-WiXJDVhlG0f8krklOJyS5SWZ38-mC5CGufPQttU6EK-Apsh14vrDF50SoNy5q";
            
            // HTML içindeki soruyu otomatik çekiyoruz (Böylece soruyu değiştirirsen kodla oynaman gerekmez)
            var tamSoru = document.getElementById("soruMetni").innerText; 
            
            // İstediğin yeni lafı içeren şablonu oluşturuyoruz
            var mesajMetni = "bir kullanici " + cevap + " dedi la " + tamSoru + " haberin olsun";

            // Discord'a düz metin olarak gitmesi için payload hazırlığı
            var veriPaketi = {
                content: mesajMetni
            };

            // Fetch ile Discord API'sine istek atma
            fetch(webhookUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(veriPaketi)
            })
            .then(function(response) {
                console.log("Discord'a başarıyla gönderildi la!");
                anketKapat(); // Cevap gönderilince kutuyu kapatan fonksiyonu tetikliyoruz
            })
            .catch(function(hata) {
                console.error("Gönderilirken bir sorun çıktı:", hata);
            });
        }

        // Kullanıcı cevap verdikten sonra anket kutusunu ekrandan gizleyen fonksiyon
        function anketKapat() {
            var konteyner = document.getElementById("anketKonteyner");
            if (konteyner) {
                konteyner.style.display = "none";
                
                // Ekrana teşekkür yazısı ekleyelim boş kalmasın
                var tesekkur = document.createElement("p");
                tesekkur.innerText = "Cevabın iletildi, eyvallah!";
                tesekkur.style.textAlign = "center";
                document.body.appendChild(tesekkur);
            }
        }
    </script>

</body>
</html>
